<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VocabOS Focus</title>
  <link rel="stylesheet" href="focus.css?v=20260519-fsrs5" />
</head>
<body>
  <div class="focus-app">
    <header class="focus-topbar">
      <div>
        <p class="eyebrow">Phase 6</p>
        <h1>沉浸式聚焦刷词</h1>
      </div>
      <div class="topbar-side">
        <div class="focus-modebar">
          <div id="currentUnitChip" class="mode-chip hidden"></div>
          <div id="topProgressChip" class="progress-chip hidden">
            <span id="topProgressLabel">总记忆进度</span>
            <strong id="topProgressText">0 / 0</strong>
            <div class="mini-meter"><i id="topProgressBar"></i></div>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="scopeToggleBtn" class="ghost-btn" type="button">切到全局</button>
          <a class="ghost-link" href="index.html">返回总览</a>
          <button id="reloadBtn" class="ghost-btn" type="button">刷新今日队列</button>
        </div>
      </div>
    </header>

    <section class="progress-shell">
      <div class="progress-head">
        <div id="deckMeta" class="deck-meta">加载今日队列中...</div>
        <div id="deckStep" class="deck-step">0 / 0</div>
      </div>
      <div class="meter-grid">
        <div class="meter-card">
          <span>今日新词</span>
          <strong id="newProgress">0 / 0</strong>
          <div class="meter"><i id="newBar"></i></div>
        </div>
        <div class="meter-card">
          <span>待复习</span>
          <strong id="reviewProgress">0 / 0</strong>
          <div class="meter warm"><i id="reviewBar"></i></div>
        </div>
      </div>
    </section>

    <main class="focus-stage">
      <section id="emptyState" class="empty-state hidden">
        <p class="eyebrow">Complete</p>
        <h2>今天的学习队列已经清空</h2>
        <p>如果你刚做过新词首轮学习，等待短间隔后再刷新，系统会把需要回炉的词重新放回队列。</p>
      </section>

      <section id="focusCard" class="focus-card hidden" tabindex="0" aria-live="polite">
        <div class="card-face card-front">
          <div class="word-badge-row">
            <span id="queueKindBadge" class="queue-badge">NEW</span>
            <span id="unitBadge" class="unit-badge">Unit</span>
          </div>
          <div class="word-core">
            <p id="wordPhoneticFront" class="phonetic-front"></p>
            <h2 id="wordText">word</h2>
            <button id="speakBtn" class="speak-btn" type="button">播放发音</button>
          </div>
          <p class="flip-hint">点击空白处、按空格，或直接点底部评分都能翻牌</p>
        </div>

        <div class="card-face card-back">
          <div class="word-badge-row">
            <span id="queueKindBadgeBack" class="queue-badge">NEW</span>
            <span id="unitBadgeBack" class="unit-badge">Unit</span>
          </div>
          <div class="back-scroll">
            <h2 id="wordTextBack">word</h2>
            <p id="wordPhonetic" class="phonetic"></p>
            <p id="wordTranslation" class="translation"></p>
            <div id="definitionBlock" class="info-block hidden"></div>
            <div id="tatoebaBlock" class="info-block hidden"></div>
            <div id="aiBlock" class="info-block hidden"></div>
            <div id="defaultExampleBlock" class="info-block hidden"></div>
            <div id="customExamplesBlock" class="info-block hidden"></div>
            <div id="notesBlock" class="info-block hidden"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="rating-dock">
      <button data-rating="1" class="rating-btn rating-again" type="button">
        <span>1</span>
        <strong>忘记</strong>
      </button>
      <button data-rating="2" class="rating-btn rating-hard" type="button">
        <span>2</span>
        <strong>困难</strong>
      </button>
      <button data-rating="3" class="rating-btn rating-good" type="button">
        <span>3</span>
        <strong>良好</strong>
      </button>
      <button data-rating="4" class="rating-btn rating-easy" type="button">
        <span>4</span>
        <strong>容易</strong>
      </button>
    </footer>
  </div>

  <script src="focus.js?v=20260519-fsrs5"></script>
</body>
</html>
